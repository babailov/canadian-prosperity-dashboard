# Canadian City Prosperity Dashboard — Cloudflare Workers (via vinext)
# account_id is set via CLOUDFLARE_ACCOUNT_ID env var
name = "canadian-prosperity-dashboard"
compatibility_date = "2026-02-27"
compatibility_flags = ["nodejs_compat"]

main = "./worker/index.ts"

[assets]
not_found_handling = "none"
binding = "ASSETS"

[images]
binding = "IMAGES"

# Environment-specific deploys are handled in CI by overriding the name:
#   main   → canadian-prosperity-dashboard-prod
#   develop → canadian-prosperity-dashboard-dev

# D1 and R2 bindings are Phase 2
# [[d1_databases]]
# binding = "DB"
# database_name = "canadian-prosperity-db"
# database_id = "REPLACE_WITH_D1_ID"
