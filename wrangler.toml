# Canadian City Prosperity Dashboard — Cloudflare Workers (via vinext)
# account_id is set via CLOUDFLARE_ACCOUNT_ID env var
name = "canadian-prosperity-dashboard"
compatibility_date = "2026-02-27"
compatibility_flags = ["nodejs_compat"]

main = "./worker/index.ts"

[assets]
not_found_handling = "none"
binding = "ASSETS"

[images]
binding = "IMAGES"

# ── Production (main branch) ──────────────────────────────────────
[env.production]
name = "canadian-prosperity-dashboard-prod"

# D1 and R2 bindings are Phase 2
# [[env.production.d1_databases]]
# binding = "DB"
# database_name = "canadian-prosperity-db-prod"
# database_id = "REPLACE_WITH_PROD_D1_ID"

# ── Development (develop branch) ──────────────────────────────────
[env.development]
name = "canadian-prosperity-dashboard-dev"

# [[env.development.d1_databases]]
# binding = "DB"
# database_name = "canadian-prosperity-db-dev"
# database_id = "REPLACE_WITH_DEV_D1_ID"
